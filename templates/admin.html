<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f7fa;
            margin:40px;
        }

        h1{
            text-align:center;
            color:#0077b6;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:30px;
            background:white;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        th,td{
            padding:15px;
            border:1px solid #ddd;
            text-align:left;
        }

        th{
            background:#0077b6;
            color:white;
        }

        tr:nth-child(even){
            background:#f8f8f8;
        }

        tr:hover{
            background:#e9f5ff;
        }
    </style>

</head>

<body>

<h1>Smile Dental Clinic - Appointments</h1>

<table>

<tr>
    <th>Name</th>
    <th>Phone</th>
    <th>Email</th>
    <th>Date</th>
    <th>Treatment</th>
    <th>Message</th>
</tr>

{% for appointment in appointments %}

<tr>

<td>{{ appointment["Name"] }}</td>
<td>{{ appointment["Phone"] }}</td>
<td>{{ appointment["Email"] }}</td>
<td>{{ appointment["Date"] }}</td>
<td>{{ appointment["Treatment"] }}</td>
<td>{{ appointment["Message"] }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
